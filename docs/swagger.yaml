openapi: 3.0.3
info:
  title: HAIRHAUS ERP API
  description: |
    Enterprise Resource Planning API for multi-branch barbershop operations.
    Covers POS transactions, cash drawer management, inventory control,
    affiliate system, salary generation, expense management, and financial reporting.
  version: 1.0.0
  contact:
    name: HAIRHAUS Engineering
servers:
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: Auth
    description: Authentication
  - name: Branches
    description: Branch management
  - name: Users
    description: User management (Admin only)
  - name: Product Categories
    description: Product category management
  - name: Products
    description: Product and service catalog
  - name: Stylists
    description: Stylist / hair maker management
  - name: Branch Products
    description: Branch-level product pricing & stock
  - name: Branch Stylists
    description: Branch-level stylist assignment & pricing
  - name: Customers
    description: Customer management
  - name: Cash Drawers
    description: Cash drawer lifecycle management
  - name: Transactions
    description: POS checkout, edit, void
  - name: Inventory
    description: Stock restock, adjustment, movements
  - name: Affiliates
    description: Affiliate / referral management
  - name: Salaries
    description: Stylist salary generation
  - name: Expense Categories
    description: Expense category management
  - name: Expenses
    description: Operational expense management
  - name: Reports
    description: Financial reporting

security:
  - BearerAuth: []

paths:
  # ==================== AUTH ====================
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== BRANCHES ====================
  /branches:
    get:
      tags: [Branches]
      summary: List all branches
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated list of branches
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Branch'
    post:
      tags: [Branches]
      summary: Create a branch
      description: "**Roles:** ADMIN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBranchRequest'
      responses:
        '201':
          description: Branch created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Branch'
        '400':
          $ref: '#/components/responses/BadRequest'

  /branches/{id}:
    get:
      tags: [Branches]
      summary: Get branch by ID
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Branch details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Branch'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Branches]
      summary: Update a branch
      description: "**Roles:** ADMIN"
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBranchRequest'
      responses:
        '200':
          description: Branch updated
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Branches]
      summary: Delete a branch
      description: "**Roles:** ADMIN"
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Branch deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /branches/{id}/products:
    get:
      tags: [Branches]
      summary: List products for a branch
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Branch products with pricing and stock
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/BranchProduct'

  /branches/{id}/stylists:
    get:
      tags: [Branches]
      summary: List stylists for a branch
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Branch stylists with pricing
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/BranchStylist'

  /branches/{id}/drawers:
    get:
      tags: [Branches]
      summary: List cash drawers for a branch
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Cash drawer history

  /branches/{id}/drawers/open:
    get:
      tags: [Branches]
      summary: Get currently open drawer for a branch
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Open drawer details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/CashDrawer'
        '404':
          description: No open drawer found

  /branches/{id}/transactions:
    get:
      tags: [Branches]
      summary: List transactions for a branch
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated transactions

  /branches/{id}/expenses:
    get:
      tags: [Branches]
      summary: List expenses for a branch
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated expenses

  /branches/{id}/salaries:
    get:
      tags: [Branches]
      summary: List salary records for a branch
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated salary records

  # ==================== USERS ====================
  /users:
    get:
      tags: [Users]
      summary: List all users
      description: "**Roles:** ADMIN"
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated list of users
    post:
      tags: [Users]
      summary: Create a user
      description: "**Roles:** ADMIN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      description: "**Roles:** ADMIN"
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: User details
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: Update a user
      description: "**Roles:** ADMIN"
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
    delete:
      tags: [Users]
      summary: Delete a user
      description: "**Roles:** ADMIN"
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: User deleted

  # ==================== PRODUCT CATEGORIES ====================
  /product-categories:
    get:
      tags: [Product Categories]
      summary: List all product categories
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated categories
    post:
      tags: [Product Categories]
      summary: Create a product category
      description: "**Roles:** ADMIN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductCategoryRequest'
      responses:
        '201':
          description: Category created

  /product-categories/{id}:
    get:
      tags: [Product Categories]
      summary: Get category by ID
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Category details
    put:
      tags: [Product Categories]
      summary: Update a category
      description: "**Roles:** ADMIN"
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductCategoryRequest'
      responses:
        '200':
          description: Category updated
    delete:
      tags: [Product Categories]
      summary: Delete a category
      description: "**Roles:** ADMIN"
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Category deleted

  # ==================== PRODUCTS ====================
  /products:
    get:
      tags: [Products]
      summary: List all products
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated products
    post:
      tags: [Products]
      summary: Create a product
      description: "**Roles:** ADMIN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product by ID
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Product details
    put:
      tags: [Products]
      summary: Update a product
      description: "**Roles:** ADMIN"
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
    delete:
      tags: [Products]
      summary: Delete a product
      description: "**Roles:** ADMIN"
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Product deleted

  # ==================== STYLISTS ====================
  /stylists:
    get:
      tags: [Stylists]
      summary: List all stylists
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated stylists
    post:
      tags: [Stylists]
      summary: Create a stylist
      description: "**Roles:** ADMIN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStylistRequest'
      responses:
        '201':
          description: Stylist created

  /stylists/{id}:
    get:
      tags: [Stylists]
      summary: Get stylist by ID
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Stylist details
    put:
      tags: [Stylists]
      summary: Update a stylist
      description: "**Roles:** ADMIN"
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStylistRequest'
      responses:
        '200':
          description: Stylist updated
    delete:
      tags: [Stylists]
      summary: Delete a stylist
      description: "**Roles:** ADMIN"
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Stylist deleted

  # ==================== BRANCH PRODUCTS ====================
  /branch-products:
    post:
      tags: [Branch Products]
      summary: Assign product to branch with optional price override
      description: "**Roles:** ADMIN, MANAGER"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBranchProductRequest'
      responses:
        '201':
          description: Branch product created

  /branch-products/{id}:
    get:
      tags: [Branch Products]
      summary: Get branch product by ID
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Branch product details
    put:
      tags: [Branch Products]
      summary: Update branch product price override
      description: "**Roles:** ADMIN, MANAGER"
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBranchProductRequest'
      responses:
        '200':
          description: Branch product updated
    delete:
      tags: [Branch Products]
      summary: Remove product from branch
      description: "**Roles:** ADMIN, MANAGER"
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Branch product deleted

  # ==================== BRANCH STYLISTS ====================
  /branch-stylists:
    get:
      tags: [Branch Stylists]
      summary: List all branch stylists across all branches
      description: |
        Returns a paginated list of all branch stylists. 
        Can be optionally filtered by branch_id.
      parameters:
        - name: branch_id
          in: query
          description: Optional branch ID to filter by
          required: false
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated branch stylists
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/BranchStylist'
    post:
      tags: [Branch Stylists]
      summary: Assign stylist to branch with optional haircut price override
      description: "**Roles:** ADMIN, MANAGER"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBranchStylistRequest'
      responses:
        '201':
          description: Branch stylist created

  /branch-stylists/{id}:
    get:
      tags: [Branch Stylists]
      summary: Get branch stylist by ID
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Branch stylist details
    put:
      tags: [Branch Stylists]
      summary: Update stylist haircut price override
      description: "**Roles:** ADMIN, MANAGER"
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBranchStylistRequest'
      responses:
        '200':
          description: Branch stylist updated
    delete:
      tags: [Branch Stylists]
      summary: Remove stylist from branch
      description: "**Roles:** ADMIN, MANAGER"
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Branch stylist deleted

  # ==================== CUSTOMERS ====================
  /customers:
    get:
      tags: [Customers]
      summary: List all customers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: name
          in: query
          description: Filter by customer name (partial, case-insensitive)
          required: false
          schema:
            type: string
        - name: phone
          in: query
          description: Filter by phone number (partial)
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated customers
    post:
      tags: [Customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created

  /customers/deleted:
    get:
      tags: [Customers]
      summary: List all soft-deleted customers
      description: Returns a paginated list of customers that have been soft-deleted
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated soft-deleted customers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DeletedCustomerResponse'

  /customers/{id}:
    get:
      tags: [Customers]
      summary: Get customer by ID
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Customer details
    put:
      tags: [Customers]
      summary: Update a customer
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerRequest'
      responses:
        '200':
          description: Customer updated
    delete:
      tags: [Customers]
      summary: Delete a customer
      description: "**Roles:** ADMIN, MANAGER. Soft delete by default, hard delete if requested."
      parameters:
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/HardDelete'
      responses:
        '200':
          description: Customer deleted
          content:
            application/json:
              schema: 
                $ref: '#/components/schemas/SuccessResponse'

  /customers/identify:
    post:
      tags: [Customers]
      summary: Identify customer by phone number
      description: Search ERP database then Loyalty Service for customer identification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentifyCustomerRequest'
      responses:
        '200':
          description: Customer identified or not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: '#/components/schemas/Customer'
                    nullable: true
                  loyalty_info:
                    $ref: '#/components/schemas/LoyaltyCheckResponse'
                    nullable: true

  /customers/loyalty/register:
    post:
      tags: [Customers]
      summary: Register new customer to loyalty system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterLoyaltyRequest'
      responses:
        '200':
          description: Loyalty registration initiated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/RegisterLoyaltyResponse'

  /customers/loyalty/otp:
    post:
      tags: [Customers]
      summary: Request OTP for loyalty
      parameters:
        - name: phone
          in: query
          required: true
          schema:
            type: string
        - name: user_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /customers/loyalty/verify:
    post:
      tags: [Customers]
      summary: Verify OTP and create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyLoyaltyOTPRequest'
      responses:
        '201':
          description: Customer verified and created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'

  /customers/loyalty/check-in:
    post:
      tags: [Customers]
      summary: Check-in a customer using QR code and amount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoyaltyCheckInRequest'
      responses:
        '200':
          description: Check-in successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/LoyaltyCheckInResponse'


  # ==================== CASH DRAWERS ====================
  /drawers/open:
    post:
      tags: [Cash Drawers]
      summary: Open a cash drawer
      description: |
        Opens a new cash drawer for a branch. Only one drawer can be open per branch at a time.
        **Roles:** ADMIN, MANAGER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenDrawerRequest'
      responses:
        '201':
          description: Drawer opened
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/CashDrawer'
        '409':
          description: An open drawer already exists for this branch

  /drawers/{id}:
    get:
      tags: [Cash Drawers]
      summary: Get drawer by ID
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Drawer details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/CashDrawer'

  /drawers/{id}/close:
    post:
      tags: [Cash Drawers]
      summary: Close a cash drawer
      description: |
        Closes the drawer by calculating expected cash, recording counted cash, and computing the variance.
        Creates a closing snapshot JSON and an audit log.
        **Roles:** ADMIN, MANAGER
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseDrawerRequest'
      responses:
        '200':
          description: Drawer closed with snapshot
        '400':
          description: Drawer is not open

  # ==================== TRANSACTIONS ====================
  /transactions/save:
    post:
      tags: [Transactions]
      summary: Save a draft transaction
      description: |
        Saves a transaction as a DRAFT. It does not deduct stock or require payments.
        **Roles:** ADMIN, MANAGER, CASHIER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveTransactionRequest'
      responses:
        '201':
          description: Draft transaction saved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Transaction'
        '400':
          description: Validation error

  /transactions/draft/{id}:
    put:
      tags: [Transactions]
      summary: Update a draft transaction
      description: |
        Updates an existing transaction that is in DRAFT status.
        **Roles:** ADMIN, MANAGER, CASHIER
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveTransactionRequest'
      responses:
        '200':
          description: Draft transaction updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Transaction'
    delete:
      tags: [Transactions]
      summary: Delete a draft transaction
      description: |
        Hard deletes a draft transaction and all its items. Only allowed for DRAFT status.
        **Roles:** ADMIN, MANAGER, CASHIER
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Draft transaction deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Not a draft, not found, or validation error
        '404':
          $ref: '#/components/responses/NotFound'

  /transactions/checkout:
    post:
      tags: [Transactions]
      summary: POS Checkout
      description: |
        Performs an atomic checkout transaction:
        - Creates transaction with snapshot fields
        - Creates transaction items with financial snapshots
        - Processes split payments
        - Deducts inventory (RETAIL products) with row-level locking
        - Creates stock movement records
        - Calculates affiliate commission if code provided
        - Supports idempotency keys to prevent duplicates

        **Roles:** ADMIN, MANAGER, CASHIER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Transaction completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Transaction'
        '400':
          description: Validation error, insufficient stock, or payment mismatch

  /transactions/{id}/checkout:
    post:
      tags: [Transactions]
      summary: Checkout a draft transaction
      description: |
        Completes an existing DRAFT transaction:
        - Deducts inventory
        - Creates stock movements
        - Calculates affiliate commission
        - Validates payments
        - Updates status to COMPLETED
        **Roles:** ADMIN, MANAGER, CASHIER
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '200':
          description: Transaction completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Transaction'
        '400':
          description: Validation error or draft not found

  /transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get transaction by ID
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Transaction with items and payments
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Transaction'
    put:
      tags: [Transactions]
      summary: Edit a transaction
      description: |
        Edit transaction discount. Only allowed when the associated cash drawer is OPEN.
        Creates an audit log.
        **Roles:** ADMIN, MANAGER
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditTransactionRequest'
      responses:
        '200':
          description: Transaction updated
        '400':
          description: Drawer is not open

  /transactions/{id}/void:
    post:
      tags: [Transactions]
      summary: Void a transaction
      description: |
        Voids a completed transaction. Only allowed when drawer is OPEN. Creates audit log.
        **Roles:** ADMIN, MANAGER
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  example: "Customer requested refund"
      responses:
        '200':
          description: Transaction voided
        '400':
          description: Drawer is not open

