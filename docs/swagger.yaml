          description: Income breakdown
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          HAIRCUT:
                            type: integer
                            format: int64
                          TREATMENT:
                            type: integer
                            format: int64
                          PRODUCT:
                            type: integer
                            format: int64
                          OTHER:
                            type: integer
                            format: int64

# ================================================================
# COMPONENTS
# ================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    HardDelete:
      name: hard_delete
      in: query
      required: false
      description: "Perform permanent hard delete"
      schema:
        type: boolean
        default: false

  responses:
    BadRequest:
      description: Bad request / validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ---- Response Envelopes ----
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string

    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items: {}
        meta:
          type: object
          properties:
            page:
              type: integer
            page_size:
              type: integer
            total_items:
              type: integer
              format: int64
            total_pages:
              type: integer
              format: int64

    # ---- Auth ----
    LoginRequest:
      type: object
      required: [phone_number, pin]
      properties:
        phone_number:
          type: string
          example: "081234567890"
        pin:
          type: string
          example: "1234"

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."
        user:
          $ref: '#/components/schemas/UserResponse'

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        loyalty_employee_id:
          type: string
          description: HAIRHAUS Loyalty Employee ID
        loyalty_outlet_id:
          type: string
          description: HAIRHAUS Loyalty Outlet ID
        name:
          type: string
        phone_number:
          type: string
        role:
          type: string
          enum: [ADMIN, MANAGER, CASHIER]
        branch_id:
          type: string
          format: uuid

    # ---- Branch ----
    Branch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "HAIRHAUS Menteng"
        code:
          type: string
          example: "HH-MTG"
        loyalty_outlet_id:
          type: string
          description: HAIRHAUS Loyalty Outlet ID
          example: "OUT-001"
        address:
          type: string
        phone:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateBranchRequest:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
          example: "HAIRHAUS Menteng"
        code:
          type: string
          example: "HH-MTG"
        loyalty_outlet_id:
          type: string
          description: HAIRHAUS Loyalty Outlet ID
          example: "OUT-001"
        address:
          type: string
        phone:
          type: string

    UpdateBranchRequest:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        loyalty_outlet_id:
          type: string
        is_active:
          type: boolean

    # ---- User ----
    CreateUserRequest:
      type: object
      required: [loyalty_employee_id, name, phone_number, pin, role, branch_id]
      properties:
        loyalty_employee_id:
          type: string
          description: HAIRHAUS Loyalty EmployeeID (role != GUEST)
          example: "cm1tnuu86000f11xfk56pfgpi"
        name:
          type: string
          example: "John Doe"
        phone_number:
          type: string
          example: "081234567890"
        pin:
          type: string
          minLength: 4
          example: "1234"
        role:
          type: string
          enum: [ADMIN, MANAGER, CASHIER]
        branch_id:
          type: string
          format: uuid

    UpdateUserRequest:
      type: object
      properties:
        loyalty_employee_id:
          type: string
        name:
          type: string
        phone_number:
          type: string
        pin:
          type: string
          minLength: 4
        role:
          type: string
          enum: [ADMIN, MANAGER, CASHIER]
        branch_id:
          type: string
          format: uuid

    # ---- Product Category ----
    CreateProductCategoryRequest:
      type: object
      required: [name, income_type]
      properties:
        name:
          type: string
          example: "Haircut"
        income_type:
          type: string
          enum: [HAIRCUT, TREATMENT, PRODUCT, OTHER]
          example: "HAIRCUT"

    UpdateProductCategoryRequest:
      type: object
      properties:
        name:
          type: string
        income_type:
          type: string
          enum: [HAIRCUT, TREATMENT, PRODUCT, OTHER]

    # ---- Product ----
    CreateProductRequest:
      type: object
      required: [name, product_type, category_id]
      properties:
        name:
          type: string
          example: "Regular Haircut"
        product_type:
          type: string
          enum: [SERVICE, RETAIL]
        category_id:
          type: string
          format: uuid
        base_price:
          type: integer
          format: int64
          example: 50000
        cost_price:
          type: integer
          format: int64
          example: 0

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        product_type:
          type: string
          enum: [SERVICE, RETAIL]
        category_id:
          type: string
          format: uuid
        base_price:
          type: integer
          format: int64
        cost_price:
          type: integer
          format: int64
        is_active:
          type: boolean

    # ---- Stylist ----
    Stylist:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    Affiliate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        loyalty_user_id:
          type: string
        affiliate_code:
          type: string
        name:
          type: string
        commission_type:
          type: string
        commission_percentage:
          type: number
          format: double
        commission_fixed:
          type: integer
          format: int64
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    CreateStylistRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: "Bondan"

    UpdateStylistRequest:
      type: object
      properties:
        name:
          type: string
        is_active:
          type: boolean

    # ---- Branch Product ----
    BranchProduct:
      type: object
      properties:
        id:
          type: string
          format: uuid
        branch_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        price_override:
          type: integer
          format: int64
          nullable: true
        stock:
          type: integer
          format: int64
        product:
          $ref: '#/components/schemas/Product'

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        product_type:
          type: string
          enum: [SERVICE, RETAIL]
        category_id:
          type: string
          format: uuid
        base_price:
          type: integer
          format: int64
        cost_price:
          type: integer
          format: int64
        is_active:
          type: boolean

    CreateBranchProductRequest:
      type: object
      required: [branch_id, product_id]
      properties:
        branch_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        price_override:
          type: integer
          format: int64
          nullable: true
        stock:
          type: integer
          format: int64
          default: 0

    UpdateBranchProductRequest:
      type: object
      properties:
        price_override:
          type: integer
          format: int64
          nullable: true

    # ---- Branch Stylist ----
    BranchStylist:
      type: object
      properties:
        id:
          type: string
          format: uuid
        branch_id:
          type: string
          format: uuid
        stylist_id:
          type: string
          format: uuid
        haircut_price_override:
          type: integer
          format: int64
          nullable: true
        commission_percentage:
          type: integer
          nullable: true

    CreateBranchStylistRequest:
      type: object
      required: [branch_id, stylist_id]
      properties:
        branch_id:
          type: string
          format: uuid
        stylist_id:
          type: string
          format: uuid
        haircut_price_override:
          type: integer
          format: int64
          nullable: true
        commission_percentage:
          type: integer
          nullable: true

    UpdateBranchStylistRequest:
      type: object
      properties:
        haircut_price_override:
          type: integer
          format: int64
          nullable: true
        commission_percentage:
          type: integer
          nullable: true

    # ---- Customer ----
    DeletedCustomerResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        deleted_at:
          type: string
          format: date-time

    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        gender:
          type: string
          enum: [Male, Female]
          nullable: true
        loyalty_user_id:
          type: string
          nullable: true
        loyalty_outlet_id:
          type: string
          nullable: true
        is_loyalty_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IdentifyCustomerRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          example: "081234567890"

    LoyaltyCheckResponse:
      type: object
      properties:
        userStatus:
          type: string
          example: "Verified"
        userID:
          type: string
          nullable: true
          example: "U12345"
        locationID:
          type: string
          nullable: true
          example: "L98765"
        phoneNumber:
          type: string
          example: "081234567890"

    LoyaltyCheckInRequest:
      type: object
      required: [code, amount]
      properties:
        code:
          type: string
          example: "QR123"
        amount:
          type: integer
          example: 150000
        notes:
          type: string
          example: "Check in note"
        metadata:
          type: object
          properties:
            type:
              type: string
            data:
              type: array
              items:
                type: object
          required: [type, data]

    LoyaltyCheckInResponse:
      type: object
      properties:
        code:
          type: string
          example: "SUCCESS"
        message:
          type: string
          example: ""
        success:
          type: boolean
          example: true
        newPoint:
          type: number
          format: float
          example: 15.5
        totalPoint:
          type: number
          format: float
          example: 150.5
        name:
          type: string
          example: "John Doe"
        phoneNumber:
          type: string
          example: "081234567890"

    LoyaltyOTPResponse:
      type: object
      properties:
        success:
          type: boolean
        otp:
          type: string
        message:
          type: string

    LoyaltyVerifyResponse:
      type: object
      properties:
        success:
          type: boolean
        verified:
          type: boolean
        message:
          type: string
        userID:
          type: string
          example: "U12345"

    LoyaltyCustomerInfo:
      type: object
      properties:
        name:
          type: string
          nullable: true
        point:
          type: number
        userId:
          type: string
          nullable: true
        registeredLocationId:
          type: string
          nullable: true

    VerifyLoyaltyOTPRequest:
      type: object
      required: [phone, otp]
      properties:
        phone:
          type: string
        otp:
          type: string
        user_id:
          type: string
          nullable: true

    RegisterLoyaltyRequest:
      type: object
      required: [phone, name, gender, outlet_id]
      properties:
        phone:
          type: string
          example: "081234567890"
        name:
          type: string
          example: "John Doe"
        gender:
          type: string
          enum: [Male, Female]
          example: "Male"
        outlet_id:
          type: string
          example: "OUT-001"

    RegisterLoyaltyResponse:
      type: object
      properties:
        customer:
          $ref: '#/components/schemas/Customer'
        requires_verification:
          type: boolean
          example: true

    CreateCustomerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: "Ahmad"
        phone:
          type: string
        gender:
          type: string
          enum: [Male, Female]
          nullable: true
        loyalty_user_id:
          type: string
          nullable: true
        loyalty_outlet_id:
          type: string
          nullable: true

    UpdateCustomerRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        gender:
          type: string
          enum: [Male, Female]
          nullable: true
        loyalty_user_id:
          type: string
          nullable: true
        loyalty_outlet_id:
          type: string
          nullable: true

    DeleteCustomerRequest:
      type: object
      properties:
        hard_delete:
          type: boolean
          default: false
          description: "If true, permanently removes customer. If false, performs soft delete."

    # ---- Cash Drawer ----
    CashDrawer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        branch_id:
          type: string
          format: uuid
        opened_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
          nullable: true
        opening_amount:
          type: integer
          format: int64
        expected_cash:
          type: integer
          format: int64
        counted_cash:
          type: integer
          format: int64
        variance:
          type: integer
          format: int64
        status:
          type: string
          enum: [OPEN, CLOSING, CLOSED]
        closing_snapshot:
          type: object
          nullable: true

    OpenDrawerRequest:
      type: object
      required: [branch_id]
      properties:
        branch_id:
          type: string
          format: uuid
        opening_amount:
          type: integer
          format: int64
          example: 500000

    CloseDrawerRequest:
      type: object
      required: [counted_cash]
      properties:
        counted_cash:
          type: integer
          format: int64
          example: 1500000

    # ---- Transaction ----
    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoice_no:
          type: string
          example: "HH-MTG-20260306-0001"
        branch_id:
          type: string
          format: uuid
        branch:
          $ref: '#/components/schemas/Branch'
        customer_id:
          type: string
          format: uuid
          nullable: true
        customer:
          $ref: '#/components/schemas/Customer'
        customer_name:
          type: string
          nullable: true
        affiliate_id:
          type: string
          format: uuid
          nullable: true
        affiliate:
          $ref: '#/components/schemas/Affiliate'
        subtotal_amount:
          type: integer
          format: int64
        discount_amount:
          type: integer
          format: int64
        total_amount:
          type: integer
          format: int64
        affiliate_commission_amount_snapshot:
          type: integer
          format: int64
        status:
          type: string
          enum: [DRAFT, COMPLETED, VOIDED]
        cash_drawer_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
        edited_by_id:
          type: string
          format: uuid
          nullable: true
        edit_reason:
          type: string
        created_by_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/TransactionItem'
        payments:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    TransactionItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        transaction_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        product:
          $ref: '#/components/schemas/Product'
        stylist_id:
          type: string
          format: uuid
          nullable: true
        stylist:
          $ref: '#/components/schemas/Stylist'
        product_name_snapshot:
          type: string
        product_type_snapshot:
          type: string
        category_name_snapshot:
          type: string
        income_type_snapshot:
          type: string
          description: "Dynamic based on Product Category"
          enum: [HAIRCUT, TREATMENT, PRODUCT, OTHER]
        stylist_name_snapshot:
          type: string
        price_snapshot:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int64
        gross_subtotal:
          type: integer
          format: int64
        item_discount:
          type: integer
          format: int64
        net_subtotal:
          type: integer
          format: int64
        commission_amount_snapshot:
          type: integer
          format: int64
        cost_price_snapshot:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        method:
          type: string
          enum: [CASH, QRIS, DEBIT, CREDIT]
        amount:
          type: integer
          format: int64
        reference_no:
          type: string

    CheckoutRequest:
      type: object
      required: [branch_id, customer_name, items, payments, idempotency_key]
      properties:
        transaction_id:
          type: string
          format: uuid
          nullable: true
          description: "ID of the draft transaction if completing a draft"
        branch_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
          nullable: true
        customer_name:
          type: string
          description: "Manual customer name override"
        affiliate_code:
          type: string
          example: "REF-AHMAD"
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CheckoutItemRequest'
        payments:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PaymentRequest'
        discount_amount:
          type: integer
          format: int64
          default: 0
        idempotency_key:
          type: string
          example: "txn-abc123-unique"

    SaveTransactionRequest:
      type: object
      required: [branch_id, customer_name, items]
      properties:
        branch_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
          nullable: true
        customer_name:
          type: string
          description: "Manual customer name override"
        affiliate_code:
          type: string
          example: "REF-AHMAD"
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CheckoutItemRequest'
        discount_amount:
          type: integer
          format: int64
          default: 0

    CheckoutItemRequest:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:
          type: string
          format: uuid
        stylist_id:
          type: string
          format: uuid
          nullable: true
        quantity:
          type: integer
          format: int64
          minimum: 1
        discount_amount:
          type: integer
          format: int64
          minimum: 0
          default: 0

    PaymentRequest:
      type: object
      required: [method, amount]
      properties:
        method:
          type: string
          enum: [CASH, QRIS, DEBIT, CREDIT]
        amount:
          type: integer
          format: int64
          minimum: 1
        reference_no:
          type: string

    EditTransactionRequest:
      type: object
      required: [items, payments, edit_reason]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CheckoutItemRequest'
        payments:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PaymentRequest'
        discount_amount:
          type: integer
          format: int64
        edit_reason:
          type: string
          example: "Manager discount applied"

    # ---- Inventory ----
    RestockRequest:
      type: object
      required: [branch_id, product_id, quantity]
      properties:
        branch_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
          format: int64
          minimum: 1
        note:
          type: string

    AdjustStockRequest:
      type: object
      required: [branch_id, product_id, change, note]
      properties:
        branch_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        change:
          type: integer
          format: int64
          description: "Positive to add, negative to subtract"
        note:
          type: string

    # ---- Affiliate ----
    CreateAffiliateRequest:
      type: object
      required: [loyalty_user_id, affiliate_code, name, commission_type]
      properties:
        loyalty_user_id:
          type: string
        affiliate_code:
          type: string
          example: "REF-AHMAD"
        name:
          type: string
          example: "Ahmad"
        commission_type:
          type: string
          enum: [PERCENTAGE, FIXED]
        commission_percentage:
          type: number
          format: double
          example: 5.0
        commission_fixed:
          type: integer
          format: int64
          example: 10000

    UpdateAffiliateRequest:
      type: object
      properties:
        name:
          type: string
        commission_type:
          type: string
          enum: [PERCENTAGE, FIXED]
        commission_percentage:
          type: number
          format: double
        commission_fixed:
          type: integer
          format: int64
        is_active:
          type: boolean

    # ---- Salary ----
    GenerateSalaryRequest:
      type: object
      required: [branch_id, stylist_id, month, year]
      properties:
        branch_id:
          type: string
          format: uuid
        stylist_id:
          type: string
          format: uuid
        month:
          type: integer
          minimum: 1
          maximum: 12
          example: 3
        year:
          type: integer
          minimum: 2020
          example: 2026

    # ---- Expense ----
    CreateExpenseCategoryRequest:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
          example: "Electricity"
        code:
          type: string
          example: "ELECTRICITY"

    UpdateExpenseCategoryRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string

    CreateExpenseRequest:
      type: object
      required: [branch_id, category_id, amount, expense_date]
      properties:
        branch_id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        description:
          type: string
          example: "March electricity bill"
        amount:
          type: integer
          format: int64
          minimum: 1
          example: 1500000
        expense_date:
          type: string
          format: date
          example: "2026-03-01"

    UpdateExpenseRequest:
      type: object
      properties:
        category_id:
          type: string
          format: uuid
        description:
          type: string
        amount:
          type: integer
          format: int64
        expense_date:
          type: string
          format: date

    # ---- Report ----
    FinancialReport:
      type: object
      properties:
        revenue:
          type: integer
          format: int64
          description: "SUM(subtotal_amount)"
        cogs:
          type: object
          properties:
            commission:
              type: integer
              format: int64
            affiliate_commission:
              type: integer
              format: int64
            retail_cost:
              type: integer
              format: int64
            discount:
              type: integer
              format: int64
            total:
              type: integer
              format: int64
        gross_profit:
          type: integer
          format: int64
          description: "Revenue - COGS"
        opex:
          type: integer
          format: int64
          description: "SUM(expenses)"
        net_profit:
          type: integer
          format: int64
          description: "Gross Profit - OPEX"
