  # ==================== REPORTS ====================
  /reports/financial:
    get:
      tags: [Reports]
      summary: Financial report
      description: |
        Returns Revenue, COGS (commission + affiliate commission + retail cost + discount),
        Gross Profit, OPEX, and Net Profit for a branch within a date range.
        **Roles:** ADMIN, MANAGER
      parameters:
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2026-01-31"
      responses:
        '200':
          description: Financial report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/FinancialReport'

  /reports/income-by-type:
    get:
      tags: [Reports]
      summary: Revenue breakdown by income type
      description: |
        Returns revenue broken down by HAIRCUT, TREATMENT, PRODUCT, and OTHER income streams.
        **Roles:** ADMIN, MANAGER
      parameters:
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: start_date
          in: query
          required: true
